apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-server
  labels:
    k3s-upgrade: server
spec:
  serviceAccountName: system-upgrade
  cordon: true
  concurrency: 1
  version: v1.31.4+k3s1
  upgrade:
    image: rancher/k3s-upgrade
  nodeSelector:
    matchExpressions:
      - key: k3s-upgrade
        operator: Exists
      - key: k3s-upgrade
        operator: NotIn
        values:
          - "disabled"
          - "false"
      - key: k3os.io/mode
        operator: DoesNotExist
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
