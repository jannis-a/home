apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set-test
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: arc-runners
  releaseName: arc-runner-set-test
  chart:
    spec:
      chart: gha-runner-scale-set
      version: 0.13.0
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: flux-system
  values:
    githubConfigUrl: "https://github.com/jannis-a/home"
    githubConfigSecret: github
    listenerTemplate:
      spec:
        containers:
        - name: listener
          securityContext:
            runAsUser: 1000
    maxRunners: 10
    minRunners: 0
