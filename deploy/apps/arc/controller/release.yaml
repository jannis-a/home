apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: flux-system
spec:
  interval: 10m
  releaseName: arc-controller
  targetNamespace: arc-system
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: 0.13.0
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: flux-system
  values:
    replicaCount: 1
