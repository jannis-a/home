apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: arc
spec:
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/apps/arc
  interval: 10m
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
  - name: cilium
