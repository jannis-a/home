apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 10m
  chart:
    spec:
      chart: external-dns
      version: 1.19.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 30m
  values:
    triggerLoopOnEvent: true
    policy: sync

    sources:
      - gateway-httproute

    provider:
      name: webhook

      webhook:
        image:
          repository: ghcr.io/muhlba91/external-dns-provider-adguard
          tag: v11.0.1

        env:
          - name: ADGUARD_URL
            valueFrom:
              secretKeyRef:
                name: external-dns-adguard
                key: url
          - name: ADGUARD_USER
            valueFrom:
              secretKeyRef:
                name: external-dns-adguard
                key: user
          - name: ADGUARD_PASSWORD
            valueFrom:
              secretKeyRef:
                name: external-dns-adguard
                key: password

        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 1
          timeoutSeconds: 5

        readinessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 1
          timeoutSeconds: 5

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
