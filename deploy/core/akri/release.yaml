apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: akri
  namespace: akri
spec:
  interval: 10m
  chart:
    spec:
      chart: akri
      version: 0.13.8
      sourceRef:
        kind: HelmRepository
        name: akri
        namespace: flux-system
  values:
    kubernetesDistro: k8s
    udev:
      discovery:
        enabled: true
