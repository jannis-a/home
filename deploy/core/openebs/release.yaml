apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: openebs
  releaseName: openebs
  chart:
    spec:
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: openebs
      chart: openebs
      version: 4.3.3
  values:
    zfs-localpv:
      zfsNode:
        encrKeysDir: /var/openebs/zfs/keys

    localpv-provisioner:
      localpv:
        enabled: false
      hostpathClass:
        enabled: false
      rbac:
        pspEnabled: false
      serviceAccount:
        create: false

    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: true
      replicated:
        mayastor:
          enabled: false
    alloy:
      enabled: false
    loki:
      enabled: false
