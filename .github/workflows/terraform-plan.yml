name: Terraform

on:
  pull_request:

defaults:
  run:
    working-directory: ./terraform

env:
  PLAN_FILE: tfplan

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Cache modules
        uses: actions/cache@v4
        with:
          path: ./terraform/.terraform
          key: tf-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('./terraform/.terraform.lock.hcl') }}
          restore-keys: |
            tf-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('./terraform/.terraform.lock.hcl') }}
            tf-${{ runner.os }}-${{ runner.arch }}-
            tf-${{ runner.os }}-
            tf-

      - name: Terraform Plan
        id: plan
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: terraform plan -detailed-exitcode -out $PLAN_FILE
      
      - name: Format plan
        id: plan-formatted
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          <details open><summary>

          ## Terraform Plan
          </summary>

          \`\`\`terraform
          $(terraform show -no-color $PLAN_FILE)
          \`\`\`
          </details>
          EOF
